name: FoundryClip
options:
  bundleIdPrefix: com.foundry
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: "Foundry Clip"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.0.0"

targets:
  FoundryClip:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/Info.plist
        buildPhase: none
      - path: Resources/FoundryClip.entitlements
        buildPhase: none
      - path: Resources/FoundryClip.xcdatamodeld
        buildPhase: sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/FoundryClip.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: HotKey
      - package: LaunchAtLogin
    entitlements:
      path: Resources/FoundryClip.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
